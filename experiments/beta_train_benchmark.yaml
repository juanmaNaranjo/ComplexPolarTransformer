# experiments/beta_train.yaml — ComplexPolarTransformer v7
# Mejoras sobre v6:
#   A. Normalización per-atom en trainer (elimina sesgo tamaño molecular)
#   B. num_rbf: 50 → 150  (más resolución radial)
#   C. cutoff: 5.0 → 7.0  (más vecinos por átomo)
#   D. num_hidden_layers: 3 → 4  (más profundidad)
#   E. grad_clip: 5.0 → 1.0  (en trainer, ya aplicado)

dataset:
  sdf: "data/qm9.sdf"
  csv: "data/qm9.csv"
  target: "u0_atom"

benchmark_split: true
sample_size: null
seed: 42

batch_size: 64
num_workers: 8
learning_rate: 0.0002
max_epochs: 300

early_stopping:
  patience: 40
  min_delta: 0.0001

scheduler:
  name: reduce_on_plateau
  factor: 0.7
  patience: 15
  min_lr: 1e-5

ckpt_dir: "checkpoints"
log_dir: "logs"
split_path: "logs/split_seed42.json"

model:
  in_dim: 5
  hidden_dim: 256
  out_dim: 1
  num_hidden_layers: 3    # CAMBIO D: 3 → 4
  num_rbf: 150            # CAMBIO B: 50 → 150
  cutoff: 7.0             # CAMBIO C: 5.0 → 7.0
  edge_dim: 4
  dropout: 0.1
  use_residuals: true
  use_layernorm: true